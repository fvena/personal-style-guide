name: Bug report
description: Something is broken or behaving unexpectedly
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: config
    attributes:
      label: Which config?
      description: e.g. `eslint/node`, `eslint/vue`, `stylelint`, `prettier`
      placeholder: eslint/vue
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: '0.6.0'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the unexpected behavior and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Paste the relevant config and the file that triggers the issue.
      render: js
    validations:
      required: true
