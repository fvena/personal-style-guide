name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - run: npm ci --ignore-scripts
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - run: npm ci --ignore-scripts
      - run: npm run typecheck

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24', 'latest']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci --ignore-scripts
      - run: npm test

  package-quality:
    name: Package Quality
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - run: npm ci --ignore-scripts
      - run: npx publint
      - run: npx knip

  examples:
    name: Examples (${{ matrix.example }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        example:
          - node-typescript
          - node-typescript-browser
          - node-javascript
          - vue-typescript
          - nuxt-typescript
          - monorepo

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install kata dependencies
        run: npm ci --ignore-scripts

      - name: Install example dependencies
        if: matrix.example != 'monorepo'
        working-directory: examples/${{ matrix.example }}
        run: npm install

      - name: Install monorepo dependencies
        if: matrix.example == 'monorepo'
        working-directory: examples/monorepo
        run: npm install --workspaces

      - name: Lint valid files (should pass)
        if: matrix.example != 'monorepo'
        working-directory: examples/${{ matrix.example }}
        run: npx eslint src/ --ignore-pattern '**/*[Ii]nvalid*'

      - name: Lint valid files (monorepo)
        if: matrix.example == 'monorepo'
        working-directory: examples/monorepo
        run: |
          cd packages/api && npx eslint src/ --ignore-pattern '**/*[Ii]nvalid*'
          cd ../../packages/web && npx eslint src/ --ignore-pattern '**/*[Ii]nvalid*'

      - name: Typecheck
        if: matrix.example != 'node-javascript' && matrix.example != 'monorepo'
        working-directory: examples/${{ matrix.example }}
        run: npx tsc --noEmit

      - name: Verify invalid files produce errors
        if: matrix.example != 'monorepo'
        working-directory: examples/${{ matrix.example }}
        run: |
          if ! npx eslint src/ --no-error-on-unmatched-pattern 2>&1 | grep -q "error"; then
            echo "Expected errors in invalid files but found none"
            exit 1
          fi
          echo "Invalid files correctly produce errors"

  publish:
    name: Publish to NPM
    environment: npm
    runs-on: ubuntu-22.04
    needs: [lint, typecheck, test, package-quality]
    if: |
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'chore(release):')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm --version
      - run: node --version
      - run: npm ci --ignore-scripts
      - run: npm publish --access public --provenance
